<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>PEM-Tracker App Icon</title>
  <defs>
    <clipPath id="circle-clip">
      <circle cx="340" cy="340" r="300"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="340" cy="340" r="300" fill="#0d1b3e"/>

  <!-- Subtle inner glow ring -->
  <circle cx="340" cy="340" r="295" fill="none" stroke="#1e2d5a" stroke-width="3"/>

  <!-- Decorative soft arc top-right -->
  <path d="M 500 110 Q 580 200 590 320" fill="none" stroke="#2a3f7a" stroke-width="28" stroke-linecap="round"/>

  <!-- Decorative soft arc bottom-left -->
  <path d="M 180 570 Q 110 480 100 360" fill="none" stroke="#2a3f7a" stroke-width="28" stroke-linecap="round"/>

  <g clip-path="url(#circle-clip)">
    <!-- Glow layer -->
    <path d="
      M 90 340
      L 195 340
      L 225 340
      L 248 260
      L 275 420
      L 298 290
      L 318 390
      L 340 340
      L 380 340
      Q 420 340 440 318
      Q 460 296 480 318
      Q 500 340 520 326
      Q 540 312 560 326
      Q 580 340 600 340
    " fill="none" stroke="#818cf8" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

    <!-- Main line -->
    <path d="
      M 90 340
      L 195 340
      L 225 340
      L 248 260
      L 275 420
      L 298 290
      L 318 390
      L 340 340
      L 380 340
      Q 420 340 440 318
      Q 460 296 480 318
      Q 500 340 520 326
      Q 540 312 560 326
      Q 580 340 600 340
    " fill="none" stroke="#818cf8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Transition dot -->
    <circle cx="340" cy="340" r="10" fill="#a5b4fc"/>
    <circle cx="340" cy="340" r="6" fill="#c7d2fe"/>

    <!-- Heart above line peak -->
    <g transform="translate(263, 195)">
      <path d="M 0 8 C 0 3 -6 -2 -12 3 C -18 8 -12 18 0 26 C 12 18 18 8 12 3 C 6 -2 0 3 0 8 Z" fill="#f472b6" opacity="0.9"/>
    </g>
  </g>

  <!-- Outer ring accent -->
  <circle cx="340" cy="340" r="300" fill="none" stroke="#4f46e5" stroke-width="5" opacity="0.6"/>
</svg>
